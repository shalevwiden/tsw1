  <!-- Make this the home selector page -->
  <body>
    <h1>
      <span id="UTheading">The University of Texas at Austin's</span> speedway
    </h1>
    <div class="maindiv">
      <div class="leftnav">
        <!-- I think the bordle will just be the homepage -->
        <a href="UT.html" class="navelements">Bordle</a
        ><a href="" class="navelements">Segment</a
        ><a href="" class="navelements">Pixelated</a>
        <a href="">By Campus Location</a>

        <a href="">Campus Leaderboard</a>
        <!-- have it so that when you change the page the nav is the same across the pages  -->
        <!-- and only the rightside div and its content changes -->
      </div>
      <!-- I actually think that the getcode part could be part of the nav ngl-->
      <!-- that could be cool -->
      <!-- enter in a stat and get one back both ways -->
      <!-- the actual minigame part  -->
      <div class="rightdiv">
        <!-- this stuff is in the right div -->
        <h2>Bordle</h2>
        <!-- for the images we will have URL's from AWS -->
        <div id="bordleimagediv">
          <img
            src="../../../thespeedway/BuildingImages/UTbuildings/Zoomed/Welch/welch1.jpg"
            alt="rip"
            id="bordleimage"
          />
        </div>

        <!-- this div should have everything related to the guesssing functionality -->
        <div class="functionaldiv">
          <div class="attemptsandscorediv">
            <p id="attempts">Attempts:</p>
            <p id="score">Score:</p>
          </div>
          <div class="notifier_and_displayanswer_div">
            <p id="displayanswer">Building Name - Building Code</p>
            <!-- Notifier if incorrect or correct -->
            <p id="notifier">That is ___</p>
          </div>
        </div>
        <!-- correct answer -->

        <div class="mainguessdiv">
          <div class="guesscheckdiv">
            <p>Enter Guess</p>
            <input id="userguess" type="text" />
            <input type="checkbox" name="enterguess" id="guessinput" />
            <button id="guessbutton">Guess your answer</button>
          </div>
          <!-- break -->
        </div>
        <div class="resultdiv"></div>
        <div class="scorediv"><p id="scoretext"></p></div>
      </div>
    </div>
